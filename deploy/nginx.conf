server {
    listen 80;
    listen [::]:80;
    server_name player.armsongs.com;

    root /var/www/sancuary-player;
    index index.html;

    # SPA fallback: hand unknown paths to index.html so vue-router can handle them
    try_files $uri $uri/ /index.html;

    # Gzip text responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Long-cache fingerprinted assets (vite emits content-hashed filenames)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # The service worker must never be cached, or PWA updates never apply.
    # Same for the web manifest and the workbox runtime (also hashed, but
    # referenced by name from sw.js so we keep them fresh too).
    location = /sw.js {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }
    location ~* ^/workbox-.*\.js$ {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }

    # Never cache the HTML entrypoint — users must always get the latest
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }
}
